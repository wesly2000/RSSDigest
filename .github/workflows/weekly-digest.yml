name: Weekly RSS Digest

on:
  schedule:
    - cron: "0 8 * * 6"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate and send digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          MODEL_TEXT_DEFAULT: ${{ secrets.MODEL_TEXT_DEFAULT }}
          MODEL_VIDEO_DEFAULT: ${{ secrets.MODEL_VIDEO_DEFAULT }}
          DIGEST_WINDOW_DAYS: ${{ secrets.DIGEST_WINDOW_DAYS }}
          FEED_USER_AGENT: ${{ secrets.FEED_USER_AGENT }}
          BILIBILI_UID: ${{ secrets.BILIBILI_UID }}
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
          GMAIL_SMTP_HOST: ${{ secrets.GMAIL_SMTP_HOST }}
          GMAIL_SMTP_PORT: ${{ secrets.GMAIL_SMTP_PORT }}
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_SMTP_APP_PASSWORD: ${{ secrets.GMAIL_SMTP_APP_PASSWORD }}
          DIGEST_EMAIL_TO: ${{ secrets.DIGEST_EMAIL_TO }}
          DIGEST_EMAIL_FROM: ${{ secrets.DIGEST_EMAIL_FROM }}
        run: python main.py --opml follow.opml --output reports/latest_digest.md

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-digest-markdown
          path: reports/latest_digest.md
