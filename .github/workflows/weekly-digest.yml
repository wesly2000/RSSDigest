name: Weekly RSS Digest

on:
  schedule:
    - cron: "0 8 * * 6"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rebuild .env file from secret
        env:
          ENV_BASE64: ${{ secrets.ENV_BASE64 }}
        run: |
          if [ -z "$ENV_BASE64" ]; then
            echo "ENV_BASE64 secret is not set."
            exit 1
          fi
          printf '%s' "$ENV_BASE64" | base64 --decode > .env

      - name: Rebuild OPML file from secret
        env:
          OPML_BASE64: ${{ secrets.OPML_BASE64 }}
        run: |
          if [ -z "$OPML_BASE64" ]; then
            echo "OPML_BASE64 secret is not set."
            exit 1
          fi
          printf '%s' "$OPML_BASE64" | base64 --decode > follow.opml

      - name: Generate and send digest
        run: python main.py --opml follow.opml --output reports/latest_digest.md

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-digest-markdown
          path: reports/latest_digest.md
